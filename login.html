<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRL WARE | Secure Authentication</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-discord: #5865F2;
            --accent-discord-hover: #4752C4;
            --bg-glass: rgba(13, 17, 23, 0.7);
            --border-glass: rgba(255, 255, 255, 0.08);
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #020408;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            color: #fff;
        }

        /* ━━ ANIMATED BACKGROUND ━━ */
        .bg-mesh {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(79, 136, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(13, 17, 23, 1) 0%, rgba(2, 4, 8, 1) 100%);
            z-index: 1;
        }

        .bg-grid {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 2;
            opacity: 0.3;
            mask-image: radial-gradient(circle at 50% 50%, black, transparent);
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 2rem;
            position: relative;
            z-index: 10;
            animation: container-reveal 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes container-reveal {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: var(--bg-glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-glass);
            border-radius: 32px;
            padding: 3.5rem 2.5rem;
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.8);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
            pointer-events: none;
        }

        .login-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #4f88ff, #a855f7);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            box-shadow: 0 15px 35px rgba(79, 136, 255, 0.3);
            position: relative;
        }

        .login-logo svg {
            width: 40px;
            height: 40px;
            color: #fff;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .login-title {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 0.75rem;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-subtitle {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 3rem;
            font-weight: 400;
        }

        .auth-btn-discord {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 1.15rem;
            background: var(--accent-discord);
            color: #fff;
            border-radius: 18px;
            font-weight: 600;
            font-size: 1.05rem;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 25px rgba(88, 101, 242, 0.3);
        }

        .auth-btn-discord:hover {
            background: var(--accent-discord-hover);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 35px rgba(88, 101, 242, 0.45);
        }

        .auth-btn-discord svg {
            width: 24px;
            height: 24px;
        }

        .security-banner {
            margin-top: 2.5rem;
            padding: 1rem;
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .security-text {
            font-size: 0.75rem;
            color: #64748b;
            line-height: 1.6;
        }

        .version-tag {
            margin-top: 2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
            letter-spacing: 0.3em;
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="bg-grid"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                    <path d="M2 17l10 5 10-5"></path>
                    <path d="M2 12l10 5 10-5"></path>
                </svg>
            </div>
            
            <h1 class="login-title">MRL WARE</h1>
            <p class="login-subtitle">Command & Control Interface</p>

            <a href="/auth/login/discord" class="auth-btn-discord">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037 19.736 19.736 0 0 0-4.885 1.515.069.069 0 0 0-.032.027C.533 9.048-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
                Continue with Discord
            </a>

            <div class="security-banner">
                <p class="security-text">
                    By accessing this terminal, you agree to all MRL WARE protocols. Authorized personnel only. Encrypted channel established.
                </p>
            </div>
        </div>

        <div class="version-tag">
            System Active • PRO SPACE GRAY v21.0.6
        </div>
    </div>

    <script>
        async function captureIntel() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('hwid')) return;

            // 1. Generate Hardware Fingerprint
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            const renderer = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "";
            const fingerprint = [navigator.userAgent, screen.width + 'x' + screen.height, renderer].join('|');
            
            const msgBuffer = new TextEncoder().encode(fingerprint);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hwid = hashArray.map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 16).toUpperCase();

            // 2. Fetch Intel
            let ipv6 = "";
            try {
                const res = await fetch('https://api64.ipify.org?format=json');
                const data = await res.json();
                if (data.ip.includes(':')) ipv6 = data.ip;
            } catch(e) {}

            const newUrl = new URL(window.location.href);
            newUrl.searchParams.set('hwid', hwid);
            if (ipv6) newUrl.searchParams.set('ipv6', ipv6);
            window.location.replace(newUrl.toString());
        }
        window.onload = captureIntel;
    </script>
</body>
</html>
